name: release

# PR-merge-driven release (release-please), single workflow like pond.
#
# On every push to main, release-please maintains a `chore(main): release X.Y.Z`
# PR: it derives the version from conventional commits, bumps pyproject.toml +
# SKILL.md's frontmatter version, and (on the PR) nothing else - the changelog
# stays git-cliff's (skip-changelog in release-please-config.json).
#
# Merging that PR is the release: release-please tags vX.Y.Z + opens the GitHub
# release, then the gated jobs below (release_created == true) publish - sdist/
# wheel -> PyPI (OIDC), image -> GHCR, git-cliff notes onto the release + dist
# assets, CHANGELOG.md/uv.lock synced back to main, and the homebrew formula.
# Everything runs in THIS workflow run, so no PAT-triggered tag handoff is
# needed. No test gate: the manual harness is the compat gate, run before merge.
# See docs/RELEASING.md.
on:
  push:
    branches: [main]

permissions:
  contents: read

# Never cancel a release mid-publish; a newer push queues behind it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + GitHub release on merge
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
    steps:
      # Default token (github.token) is enough: everything publishes in this same
      # run, so we never rely on the created tag to trigger another workflow.
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  dist:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: [release-please, dist]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC) - no token secret
    steps:
      - uses: astral-sh/setup-uv@v6
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: uv publish dist/*

  image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push-to-main trigger has no git tag ref, so feed the version explicitly
      # (type=semver reads the ref). `latest` is declared, not inherited from
      # metadata-action's implicit latest=auto - the CLI falls back to it.
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/glim-sh/cuttle
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=latest
            type=sha

      # clark/clearcote ship linux-x64 prebuilts only, so the image is amd64-only.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # release-please already created the tag + release; here we put git-cliff notes
  # + dist assets on it, and sync the git-cliff CHANGELOG.md and uv.lock (which
  # release-please does not touch) back to main.
  finalize:
    needs: [release-please, dist]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release edit + commit CHANGELOG/uv.lock back to main
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # git-cliff walks tags for --latest and the compare link
      - uses: astral-sh/setup-uv@v6
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # git-cliff ships on PyPI, so uvx runs the same binary as local git-cliff.
      # The leading `## [version]` heading is stripped - GitHub shows the tag as
      # the title; the Full Changelog footer survives (pond-style).
      - name: Release notes + assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          uvx git-cliff --latest --strip header | awk '!s && /^## /{s=1; next} s' > "$RUNNER_TEMP/notes.md"
          gh release edit "$TAG" --notes-file "$RUNNER_TEMP/notes.md" \
            || gh release create "$TAG" --notes-file "$RUNNER_TEMP/notes.md" --verify-tag
          gh release upload "$TAG" dist/* --clobber
      - name: Sync CHANGELOG.md + uv.lock back to main
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          uvx git-cliff -o CHANGELOG.md
          uv lock
          if ! git diff --quiet CHANGELOG.md uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md uv.lock
            git commit -m "chore(release): sync CHANGELOG + uv.lock for $TAG [skip ci]"
            git push origin HEAD:main
          fi

  # The formula fetches the sdist from the GitHub release, so it publishes only
  # after finalize has uploaded the dist assets to that release.
  homebrew:
    needs: [release-please, finalize]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Render and push formula
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          V: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          python3 scripts/render-homebrew-formula.py \
            --version "$V" --sdist "dist/cuttle_browser-$V.tar.gz" --out "$RUNNER_TEMP/cuttle.rb"
          tap="$RUNNER_TEMP/tap"
          rm -rf "$tap"
          git clone --depth 1 "https://x-access-token:$GH_RELEASE_TOKEN@github.com/tenequm/homebrew-tap" "$tap"
          cp "$RUNNER_TEMP/cuttle.rb" "$tap/Formula/cuttle.rb"
          git -C "$tap" add Formula/cuttle.rb
          git -C "$tap" diff --quiet --staged || git -C "$tap" -c user.name=ci -c user.email=ci@cuttle commit -m "cuttle $V"
          git -C "$tap" push
