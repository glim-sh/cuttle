name: release

# PR-merge-driven release (release-please). On every push to main, release-please
# maintains a `chore(main): release X.Y.Z` PR: it derives the version from
# conventional commits and maintains CHANGELOG.md + the release notes.
#
# Merging that PR is the release: release-please tags vX.Y.Z + opens the GitHub
# release, then the gated jobs (release_created == true) publish - GoReleaser
# builds the cross-platform CLI binaries + checksums + the Homebrew cask and
# appends them to the release, and the image is built and pushed to GHCR.
# Everything runs in THIS workflow run, so no PAT-triggered tag handoff is needed.
on:
  push:
    branches: [main]

permissions:
  contents: read

# Never cancel a release mid-publish; a newer push queues behind it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + GitHub release on merge
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
    steps:
      # Default token (github.token) is enough: everything publishes in this same
      # run, so we never rely on the created tag to trigger another workflow.
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # append binaries/checksums to the release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser needs full history + the release-please tag
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Push the Homebrew cask to the separate tap repo.
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

  image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push-to-main trigger has no git tag ref, so feed the version explicitly.
      # `latest` is declared, not inherited from metadata-action's implicit
      # latest=auto - the CLI falls back to it.
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/glim-sh/cuttle
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=latest
            type=sha

      # clark/clearcote ship linux-x64 prebuilts only, so the image is amd64-only.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
