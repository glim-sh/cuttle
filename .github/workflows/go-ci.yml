name: go-ci

# Lint + test + vuln-scan the authored Go (packages/cuttle-go). Path-filtered to
# Go changes; the Python `ci`/`smoke` gates cover packages/cuttle-py.
on:
  pull_request:
    paths:
      - "packages/cuttle-go/**"
      - ".github/workflows/go-ci.yml"
  push:
    branches: [main]
    paths:
      - "packages/cuttle-go/**"
      - ".github/workflows/go-ci.yml"

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/cuttle-go

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/cuttle-go/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: packages/cuttle-go

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/cuttle-go/go.mod
      - run: go install gotest.tools/gotestsum@latest
      - name: Test
        run: gotestsum --format github-actions --junitfile unit-tests.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-test-results
          path: packages/cuttle-go/unit-tests.xml

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/cuttle-go/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
