# git-cliff config - ported from pond's release-plz [changelog] so releases
# read the same: emoji-grouped sections, scope-bolded entries, PR links,
# breaking markers, and a Full Changelog compare footer. The `<!-- N -->`
# prefixes order the sections (group_by sorts alphabetically; GitHub renders
# the HTML comments invisibly).

[changelog]
# Single trailing newline: git-cliff emits one more before the first release body.
header = """# Changelog
"""
# trim=false with exact template whitespace: unlike release-plz (which splices
# sections into the changelog), git-cliff concatenates rendered bodies, and
# trim=true would eat the blank line between releases.
body = """## [{{ version | trim_start_matches(pat="v") }}](https://github.com/glim-sh/cuttle/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}{% if commit.scope %}- **{{ commit.scope }}:** {% else %}- {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/glim-sh/cuttle/commit/{{ commit.id }}))
{% endfor %}{% endfor %}{% if previous.version %}
**Full Changelog**: https://github.com/glim-sh/cuttle/compare/{{ previous.version }}...{{ version }}

{% endif %}"""
trim = false

[git]
conventional_commits = true
# Catch-all parser routes unconventional commits to Other instead of dropping them.
filter_unconventional = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/glim-sh/cuttle/pull/${1}))" },
]
commit_parsers = [
  { message = "^chore: release", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^[a-z]+(\\(.+\\))?!:", group = "<!-- 0 -->🛠 Breaking Changes" },
  { body = "^BREAKING CHANGE", group = "<!-- 0 -->🛠 Breaking Changes" },
  { message = "^feat", group = "<!-- 1 -->🎉 New Features" },
  { message = "^fix", group = "<!-- 2 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 3 -->🚀 Performance" },
  { message = "^refactor", group = "<!-- 4 -->🚜 Refactor" },
  { message = "^docs", group = "<!-- 5 -->📚 Documentation" },
  { message = "^chore|^ci|^build|^test", group = "<!-- 6 -->🧹 Chores" },
  { message = "^.*", group = "<!-- 7 -->🔧 Other" },
]
