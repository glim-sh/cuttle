apiVersion: v2
name: cuttle
description: Stealth-Chromium CDP farm - one Deployment running `cuttle serve`, reached over kubectl port-forward.
type: application
# Chart version tracks its own shape, so it is bumped by hand. appVersion tracks
# the release and is bumped by release-please (see extra-files in
# .github/release-please-config.json) - do not edit it manually. That entry MUST
# stay in the {"type": "generic"} form: a bare "path.yaml" string also runs
# release-please's jsonpath updater, which is hardcoded to $.version - it would
# bump this line instead of appVersion and strip every comment here.
version: 0.1.0
appVersion: "0.5.1" # x-release-please-version
kubeVersion: ">=1.21.0-0"
home: https://glim.sh
sources:
  - https://github.com/glim-sh/cuttle
keywords:
  - chromium
  - cdp
  - browser
maintainers:
  - name: glim.sh
