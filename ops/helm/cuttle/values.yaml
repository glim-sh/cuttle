# cuttle Helm chart values. The CLI (`cuttle up` with a k8s context) shells
# `helm upgrade --install` against this chart and sets image.tag/proxy/etc from
# the context config; these are the defaults for a manual `helm install`.

image:
  repository: ghcr.io/glim-sh/cuttle
  # Bumped by release-please (see extra-files in .github/release-please-config.json)
  # so the chart default never skews from the released daemon. `cuttle up`
  # overrides it only when --image is passed.
  tag: "0.6.0" # x-release-please-version
  pullPolicy: IfNotPresent

# One browser per release. CDP is single-writer; do not scale this up.
replicaCount: 1

# profileStorage selects the profile backing store:
#   local  - ephemeral emptyDir scratch (the default). Per-seed Chrome profile
#            dirs are disposable; auth state is captured over CDP - the daemon
#            supervises checkpoints and re-injects them at launch, and the
#            operator's machine pulls them into the local-canonical store. Nothing
#            durably persists in the pod, so the container stays disposable.
#   remote - a durable PVC (RWO) with --keep-profile for autonomous / always-on
#            use where the operator's machine is not present to inject state; this
#            keeps full Chrome-profile fidelity (IndexedDB, service workers).
profileStorage: local

# Where the per-seed Chrome user_data_dirs live inside the container. The scratch
# volume (emptyDir or PVC) mounts here.
dataDir: /data

# Default proxy applied to every seed at browser startup (CUTTLE_PROXY).
# geoip (tz/locale/exit-IP) auto-follows it. Empty = no default proxy.
proxy: ""

# Seconds of no CDP client activity after which an idle per-seed browser is
# closed (CUTTLE_IDLE_TIMEOUT). Empty (or "0") = off, browsers stay warm. Set by
# `cuttle up --idle-timeout` for a k8s context.
idleTimeout: ""

# The image is linux/amd64 only (clark/clearcote ship linux-x64 prebuilts); a
# hard kubernetes.io/arch=amd64 selector is always merged in - never schedule on
# arm. Extra selectors here are additive (e.g. a dedicated browser node pool).
nodeSelector: {}

tolerations: []

resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 4Gi

# PVC settings, used only when profileStorage=remote.
persistence:
  size: 5Gi
  # Leave null to use the cluster default StorageClass.
  storageClass: ""

# CUTTLE_VNC=1 makes the KasmVNC web viewer on 6080 live for login handoff.
vnc: true
