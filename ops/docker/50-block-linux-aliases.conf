<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Chromium/Skia (SkFontConfigInterface_direct.cpp) hardcodes a
     metric-compatible equivalence table (kFontEquivMap): SANS{Arial, Arimo,
     Liberation Sans}, SERIF{Times New Roman, Tinos, Liberation Serif},
     MONO{Courier New, Cousine, Liberation Mono}, GOTHIC{MS Gothic, IPAGothic,
     ...}, CALIBRI{Calibri, Carlito}, CAMBRIA{Cambria, Caladea}. Its MatchFont()
     accepts a substitute when IsMetricCompatibleReplacement(requested_family,
     matched_font_family) is true - comparing the ORIGINAL requested family to
     the matched font's family. So a request for a Linux family name is accepted
     against our renamed Windows font, leaking the Linux name to font-enumeration
     probes; no fontconfig ALIAS can prevent this because the check ignores the
     post-config family. The fix: rewrite each Linux name to the glyphless
     `cuttle-null` sink font (see scripts/make-null-font.py). fontconfig then
     returns cuttle-null (post_config == post_match -> accepted), the browser
     finds no glyphs and falls through to the CSS generic, so the Linux name
     measures identically to the base font - exactly as on a real Windows Chrome
     where these families do not exist. -->
<fontconfig>
  <match target="pattern"><test name="family"><string>Liberation Sans</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Liberation Serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Liberation Mono</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Arimo</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Tinos</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Cousine</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Carlito</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Caladea</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>IPAGothic</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>IPAPGothic</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>WenQuanYi Zen Hei</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Loma</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Noto Color Emoji</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Noto Sans CJK JP</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
  <match target="pattern"><test name="family"><string>Noto Sans Mono CJK JP</string></test>
    <edit name="family" mode="assign" binding="strong"><string>cuttle-null</string></edit></match>
</fontconfig>
