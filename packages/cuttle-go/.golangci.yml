version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - err113
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - goconst
    - gocritic
    - gosec
    - intrange
    - misspell
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - nonamedreturns
    - perfsprint
    - prealloc
    - revive
    - sqlclosecheck
    - testifylint
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    govet:
      enable:
        - shadow
    gocritic:
      enabled-checks:
        - nestingReduce
    goconst:
      # Table-driven tests legitimately repeat literals; only production
      # repetition is worth hoisting to a constant.
      ignore-tests: true
    wrapcheck:
      # Errors returned from our own internal packages are already domain errors;
      # re-wrapping them at every hop adds noise, not context. Only external
      # (stdlib / third-party) errors must be wrapped.
      ignore-package-globs:
        - github.com/glim-sh/cuttle/packages/cuttle-go/*
    revive:
      enable-all-rules: true
      rules:
        # Writes to stdout/stderr and to an in-memory strings.Builder never
        # return an error worth handling.
        - name: unhandled-error
          arguments:
            - "fmt\\.Fprint.*"
            - "fmt\\.Print.*"
            - "strings\\.Builder\\.Write.*"
            - "bytes\\.Buffer\\.Write.*"
        # The comma-ok form (x, _ := v.(T)) is a deliberate best-effort read.
        - name: unchecked-type-assertion
          arguments:
            - acceptIgnoredAssertionResult: true
        # Style rules that conflict with idiomatic Go / gofumpt or add noise
        # without catching defects. Everything else stays on.
        - name: line-length-limit
          disabled: true
        - name: add-constant
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: function-length
          disabled: true
        - name: argument-limit
          disabled: true
        - name: enforce-switch-style
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: unused-receiver
          disabled: true
        # Conflicts with the nonamedreturns linter (which forbids named returns).
        - name: confusing-results
          disabled: true
        - name: function-result-limit
          disabled: true
        # Anonymous structs are idiomatic for JSON fixtures.
        - name: nested-structs
          disabled: true
    errcheck:
      check-type-assertions: true
  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - wrapcheck
          - goconst
          - revive
          - bodyclose
          - noctx

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: strict

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      colors: true
  sort-order:
    - linter
    - file
  show-stats: true
